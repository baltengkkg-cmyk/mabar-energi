        // --- WEB AUDIO API (SOUND EFFECTS) ---
        let audioCtx = null;
        const playSfx = (type) => {
            try {
                const AudioContext = window.AudioContext || window.webkitAudioContext;
                if (!AudioContext) return; 

                if (!audioCtx) {
                    audioCtx = new AudioContext();
                }
                if (audioCtx.state === 'suspended') audioCtx.resume();
                
                const oscillator = audioCtx.createOscillator();
                const gainNode = audioCtx.createGain();
                
                oscillator.connect(gainNode);
                gainNode.connect(audioCtx.destination);
                
                if (type === 'correct') {
                    oscillator.type = 'sine';
                    oscillator.frequency.setValueAtTime(523.25, audioCtx.currentTime); 
                    oscillator.frequency.exponentialRampToValueAtTime(1046.50, audioCtx.currentTime + 0.1); 
                    gainNode.gain.setValueAtTime(0.5, audioCtx.currentTime);
                    gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.3);
                    oscillator.start(audioCtx.currentTime);
                    oscillator.stop(audioCtx.currentTime + 0.3);
                } else if (type === 'incorrect') {
                    oscillator.type = 'sawtooth';
                    oscillator.frequency.setValueAtTime(150, audioCtx.currentTime); 
                    oscillator.frequency.exponentialRampToValueAtTime(100, audioCtx.currentTime + 0.2); 
                    gainNode.gain.setValueAtTime(0.5, audioCtx.currentTime);
                    gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.2);
                    oscillator.start(audioCtx.currentTime);
                    oscillator.stop(audioCtx.currentTime + 0.2);
                } else if (type === 'click') {
                    // Efek suara ketukan/sentuhan lembut
                    oscillator.type = 'sine';
                    oscillator.frequency.setValueAtTime(400, audioCtx.currentTime); 
                    oscillator.frequency.exponentialRampToValueAtTime(200, audioCtx.currentTime + 0.05); 
                    gainNode.gain.setValueAtTime(0.2, audioCtx.currentTime);
                    gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.05);
                    oscillator.start(audioCtx.currentTime);
                    oscillator.stop(audioCtx.currentTime + 0.05);
                }
            } catch (err) {
                console.warn("Efek suara tidak didukung atau diblokir browser.", err);
            }

        // --- LEVEL 1 (Drag & Drop Jenis Energi) ---

            const [feedbackMsg, setFeedbackMsg] = useState("");

            const handleDragStart = (e, item) => { e.dataTransfer.setData("item", JSON.stringify(item)); };

            const handleDragLeave = (e) => { e.preventDefault(); setDragOverTarget(null); }
            const handleDrop = (e, target) => {
                e.preventDefault(); 
                setDragOverTarget(null);
                const itemData = e.dataTransfer.getData("item");
                if (itemData) {
                    const item = JSON.parse(itemData);
                    setDroppedItems(prev => ({ ...prev, [item.id]: target.id }));
                    setFeedbackMsg("");
                }
            };

            const handleRemoveItem = (itemId) => {
                setDroppedItems(prev => { const newItems = { ...prev }; delete newItems[itemId]; return newItems; });
                setFeedbackMsg("");
            };

            const handleItemClick = (item) => { setSelectedItem(selectedItem?.id === item.id ? null : item); };
            const handleTargetClick = (target) => { 
                if (selectedItem) {
                    setDroppedItems(prev => ({ ...prev, [selectedItem.id]: target.id }));
                    setSelectedItem(null);
                    setFeedbackMsg("");
                } 
            };

            const handleCheckAnswer = () => {
                let isAllCorrect = true;
                data.items.forEach(item => { if (droppedItems[item.id] !== item.matchId) isAllCorrect = false; });

                if (isAllCorrect) {
                    playSfx('correct');
                    for(let i=0; i<6; i++) { if (onCorrect) onCorrect(); }
                    setCompleted(true);
                } else {
                    playSfx('incorrect');
                    setFeedbackMsg("Oops! Ada gambar yang masuk ke kelompok energi yang salah. Coba periksa lagi!");
                }
            };

            const allItemsDropped = Object.keys(droppedItems).length === data.items.length;

            return (
                <div className="flex flex-col h-full w-full max-w-7xl mx-auto flex-1 min-h-0">

                    <div className="flex flex-col flex-1 min-h-0 animate-fade-in">

                                !droppedItems[item.id] && (

        // --- LEVEL 4: SULAWESI (Paragraf Rumpang) ---
        function Level4Sulawesi({ onComplete, onCorrect }) {
            const data = LEVEL_DATA[4];
            const [droppedWords, setDroppedWords] = useState({}); 
            const [availableWords, setAvailableWords] = useState([]);
            const [selectedWord, setSelectedWord] = useState(null);
            const [dragOverBlank, setDragOverBlank] = useState(null);
            const [feedbackMsg, setFeedbackMsg] = useState("");
            const [completed, setCompleted] = useState(false);

            useEffect(() => {
                setAvailableWords(shuffleArray(data.words));
                setDroppedWords({});
            }, [data.words]);

            const handleDragStart = (e, word, sourceBlankId = null) => {
                e.dataTransfer.setData("word", JSON.stringify(word));
                e.dataTransfer.setData("source", sourceBlankId || "pool");
            };

            const handleDropOnBlank = (e, blankId) => {
                e.preventDefault();
                setDragOverBlank(null);
                const wordData = e.dataTransfer.getData("word");
                const source = e.dataTransfer.getData("source");
                
                if (wordData) {
                    const word = JSON.parse(wordData);
                    setAvailableWords(prev => prev.filter(w => w.id !== word.id));
                    setDroppedWords(prev => {
                        const newDropped = { ...prev };
                        if (source !== "pool" && source !== blankId) delete newDropped[source];
                        if (newDropped[blankId]) setAvailableWords(avail => [...avail, newDropped[blankId]]);
                        newDropped[blankId] = word;
                        return newDropped;
                    });
                    setFeedbackMsg("");
                    setSelectedWord(null);
                }
            };

            const handleDropOnPool = (e) => {
                e.preventDefault();
                const wordData = e.dataTransfer.getData("word");
                const source = e.dataTransfer.getData("source");
                
                if (wordData && source !== "pool") {
                    const word = JSON.parse(wordData);
                    setDroppedWords(prev => {
                        const newDropped = { ...prev };
                        delete newDropped[source];
                        return newDropped;
                    });
                    setAvailableWords(prev => {
                        if (!prev.find(w => w.id === word.id)) return [...prev, word];
                        return prev;
                    });
                    setFeedbackMsg("");
                }
            };
            
            const handleWordClick = (word) => { setSelectedWord(selectedWord?.id === word.id ? null : word); };

            const handleBlankClick = (blankId) => {
                if (selectedWord) {
                    if (droppedWords[blankId]) setAvailableWords(prev => [...prev, droppedWords[blankId]]);
                    setDroppedWords(prev => ({...prev, [blankId]: selectedWord}));
                    setAvailableWords(prev => prev.filter(w => w.id !== selectedWord.id));
                    setSelectedWord(null);
                    setFeedbackMsg("");
                } else if (droppedWords[blankId]) {
                    setAvailableWords(prev => [...prev, droppedWords[blankId]]);
                    setDroppedWords(prev => {
                        const newDropped = {...prev};
                        delete newDropped[blankId];
                        return newDropped;
                    });
                    setFeedbackMsg("");
                }
            };

            const handleCheckAnswer = () => {
                let isAllCorrect = true;
                let totalBlanks = 0;
                let filledBlanks = 0;

                data.paragraphs.forEach(p => {
                    p.sentences.forEach(s => {
                        totalBlanks++;
                        const dropped = droppedWords[s.blankId];
                        if (dropped) {
                            filledBlanks++;
                            if (dropped.text !== s.correct) isAllCorrect = false;
                        } else {
                            isAllCorrect = false;
                        }
                    });
                });

                if (filledBlanks < totalBlanks) {
                    setFeedbackMsg("Isi semua bagian rumpang laporan terlebih dahulu ya!");
                    return;
                }

                if (isAllCorrect) {
                    playSfx('correct');
                    for(let i=0; i<5; i++) { if (onCorrect) onCorrect(); }
                    setCompleted(true);
                } else {
                    playSfx('incorrect');
                    setFeedbackMsg("Masih ada kata yang keliru. Klik kata di paragraf untuk mengembalikannya, lalu coba lagi!");
                }
            };

            return (
                <div className="flex flex-col h-full w-full max-w-5xl mx-auto flex-1 min-h-0">
                   {!completed ? (
                       <div className="bg-white/95 rounded-3xl shadow-xl border-2 border-purple-200 flex flex-col flex-1 min-h-0 mt-4 overflow-hidden">
                           
                           <div className="w-full p-4 md:p-8 xl:p-12 flex flex-col flex-1 min-h-0">
                               
                               <div className="bg-purple-100 p-4 md:p-6 xl:p-8 rounded-xl mb-4 xl:mb-8 text-center border-2 border-dashed border-purple-300 flex-shrink-0"
                                    onDragOver={(e) => { e.preventDefault(); }}
                                    onDrop={handleDropOnPool}
                               >
                                   <p className="text-sm md:text-base xl:text-xl font-bold text-purple-800 mb-3 xl:mb-5">KATA UNTUK JURNAL (Tarik atau Klik):</p>
                                   <div className="flex flex-wrap gap-3 xl:gap-5 justify-center">
                                       {availableWords.map(word => (
                                            <div 
                                                key={word.id} 
                                                draggable 
                                                onDragStart={(e) => handleDragStart(e, word)}
                                                onClick={() => handleWordClick(word)}
                                                className={`px-4 py-2 md:px-6 md:py-3 xl:px-8 xl:py-4 rounded-lg border-2 font-bold text-sm md:text-base xl:text-2xl cursor-grab active:cursor-grabbing shadow-sm transition-all select-none ${selectedWord?.id === word.id ? 'bg-purple-500 border-purple-600 text-white scale-105' : 'bg-white text-gray-700 border-purple-300 hover:border-purple-400 hover:bg-purple-50'}`}
                                            >
                                                {word.text}
                                            </div>
                                       ))}
                                       {availableWords.length === 0 && <span className="text-sm xl:text-lg text-gray-500 italic mt-3">Semua kata sudah digunakan di paragraf.</span>}
                                   </div>
                               </div>

                               <div className="flex-grow overflow-y-auto pr-2 custom-scrollbar space-y-5">
                                    {data.paragraphs.map(p => (
                                        <div key={p.id} className="bg-gray-50 p-5 xl:p-8 rounded-2xl border border-gray-200">
                                            {p.title && <h4 className="text-sm xl:text-lg font-bold text-gray-400 mb-3 xl:mb-5">{p.title}</h4>}
                                            <p className="text-base md:text-lg xl:text-3xl leading-[2.5] xl:leading-[2.8] text-gray-800 font-medium">
                                                {p.sentences.map(s => (
                                                    <span key={s.id}>
                                                        {s.before}
                                                        <span 
                                                            onClick={() => handleBlankClick(s.blankId)}
                                                            onDragOver={(e) => { e.preventDefault(); setDragOverBlank(s.blankId); }}
                                                            onDragLeave={() => setDragOverBlank(null)}
                                                            onDrop={(e) => handleDropOnBlank(e, s.blankId)}
                                                            className={`inline-block mx-1 xl:mx-2 min-w-[120px] xl:min-w-[180px] h-8 md:h-10 xl:h-14 text-center align-middle rounded-lg border-b-4 cursor-pointer transition-all ${
                                                              dragOverBlank === s.blankId ? 'bg-sky-100 border-sky-400' : 'bg-gray-100 border-gray-300 border-dashed'
                                                            } ${droppedWords[s.blankId] ? 'bg-sky-500 border-sky-600 text-white font-bold shadow-inner' : ''}`}
                                                        >
                                                            {droppedWords[s.blankId] ? droppedWords[s.blankId].text : ''}
                                                        </span>
                                                        {s.after}
                                                    </span>
                                                ))}
                                            </p>
                                        </div>
                                    ))}
                               </div>

                               <div className="mt-5 xl:mt-8 flex flex-col items-center flex-shrink-0">
                                   {feedbackMsg && <p className="text-red-600 font-bold text-sm md:text-base xl:text-xl mb-4 bg-red-100 px-5 py-3 xl:px-8 xl:py-4 rounded-xl border border-red-200 text-center">{feedbackMsg}</p>}
                                   <button onClick={handleCheckAnswer} className="bg-gradient-to-b from-blue-500 to-blue-600 hover:from-blue-400 hover:to-blue-500 text-white font-black py-4 px-10 xl:py-6 xl:px-16 rounded-2xl shadow-[0_6px_0_#1d4ed8] active:shadow-none active:translate-y-2 transition-all text-base md:text-lg xl:text-2xl flex items-center justify-center gap-3 w-full md:w-auto">
                                       <Icons.CheckCircle className="w-6 h-6 xl:w-8 xl:h-8" /> Cek Jurnal
                                   </button>
                               </div>
                           </div>
                       </div>
                   ) : (
                       <div className="bg-white/95 p-8 md:p-12 xl:p-16 rounded-3xl shadow-xl text-center space-y-6 border border-green-100 max-w-4xl mx-auto animate-fade-in mt-10">
                         <div className="w-20 h-20 xl:w-28 xl:h-28 bg-green-100 rounded-full flex items-center justify-center mx-auto text-4xl xl:text-6xl shadow-inner">🎉</div>
                         <div>
                             <h3 className="text-2xl md:text-4xl xl:text-5xl font-black text-green-800 uppercase tracking-wider mb-4">Jurnal Sempurna!</h3>
                             <p className="text-lg md:text-xl xl:text-3xl font-bold text-gray-700 leading-relaxed">Kamu berhasil merumuskan cara memanfaatkan sumber energi di sekitar untuk mitigasi iklim.</p>
                         </div>
                         <button onClick={onComplete} className="bg-gradient-to-b from-green-500 to-green-600 hover:from-green-400 hover:to-green-500 text-white font-black w-full py-5 xl:py-6 text-xl xl:text-3xl rounded-2xl shadow-[0_6px_0_#166534] active:shadow-none active:translate-y-2 transition-all mt-4">Lanjut Misi Terakhir 🚀</button>
                       </div>
                   )}
                </div>
            );
        }

        // --- LEVEL 5: PROYEK IPAS (Komunikasi Penyelidikan) ---
        function Level5Papua({ onComplete, saveRef, saveData }) {
            const data = LEVEL_DATA[5];
            const [a1, setA1] = useState("");
            const [a2, setA2] = useState("");
            const [a3, setA3] = useState("");
            const [format, setFormat] = useState("");
            const [plan, setPlan] = useState("");
            const [reflection, setReflection] = useState("");
            const [step, setStep] = useState('project');

            const handleSubmitProject = () => { 
                if (!a1 || !a2 || !a3 || !format || !plan) {
                    alert("Wah, sepertinya masih ada bagian Analisis atau Rencana Kampanye yang belum diisi. Lengkapi dulu ya, Pahlawan!");
                    return;
                }
                playSfx('correct');
                saveData('final_project', {
                    'Pemborosan Energi': a1, 'Alasan Merusak Lingkungan': a2, 'Solusi': a3, 'Format Kampanye': format, 'Isi Pesan Kampanye': plan
                }); 
                setStep('reflection');
            };
            
            const handleFinish = () => {
                saveRef(reflection); 
                onComplete();
            };

            if (step === 'reflection') {
                return (
                    <div className="flex flex-col h-full w-full justify-center">
                        <ReflectionSection question={data.reflection} value={reflection} onChange={setReflection} onNext={handleFinish} />
                    </div>
                );
            }

            return (
                <div className="flex flex-col h-full w-full max-w-7xl mx-auto flex-1 min-h-0 pb-4">
                   <div className="bg-blue-100 text-blue-800 p-3 xl:p-4 rounded-xl text-center font-bold text-sm md:text-base xl:text-xl border-l-4 border-blue-500 shadow-sm flex items-center justify-center gap-3 mb-4 flex-shrink-0">
                     <Icons.Zap className="w-5 h-5 xl:w-7 xl:h-7 text-blue-600" /> Rancang kampanye penghematan energi untuk melindungi bumi!
                   </div>

                   <div className="bg-white/95 rounded-3xl shadow-xl border-2 border-red-200 overflow-hidden flex flex-col md:flex-row flex-1 min-h-0">
                        {/* Panel Kiri: Cerita Masalah */}
                        <div className="md:w-5/12 bg-red-50 p-4 md:p-6 xl:p-10 border-b md:border-b-0 md:border-r border-red-200 flex flex-col min-h-0 overflow-y-auto custom-scrollbar">
                            <h3 className="font-black text-red-800 mb-3 xl:mb-5 flex items-center gap-3 text-base md:text-lg xl:text-2xl flex-shrink-0">
                                <Icons.BookOpen className="w-5 h-5 md:w-6 md:h-6 xl:w-8 xl:h-8" /> {data.stimulusTitle}
                            </h3>
                            <div className="text-gray-700 text-sm md:text-base xl:text-xl whitespace-pre-wrap leading-relaxed font-medium bg-white p-4 md:p-6 xl:p-8 rounded-2xl border border-red-100 shadow-sm mb-6 flex-1">
                                {data.stimulusText}
                            </div>

                            <div className="bg-yellow-100 p-5 xl:p-8 rounded-2xl border-2 border-yellow-300 mt-auto shadow-sm flex-shrink-0">
                                <h4 className="font-black text-yellow-800 mb-2 xl:mb-4 text-sm md:text-base xl:text-2xl">{data.tasks.t3.title}</h4>
                                <p className="text-xs md:text-sm xl:text-xl text-yellow-900 font-bold leading-relaxed">{data.tasks.t3.desc}</p>
                            </div>
                        </div>

                        {/* Panel Kanan: Form Proyek */}
                        <div className="md:w-7/12 p-4 md:p-6 xl:p-10 flex flex-col bg-white min-h-0">
                            <div className="space-y-4 xl:space-y-8 flex-grow overflow-y-auto custom-scrollbar pr-2">
                                {/* Langkah 1 */}
                                <div>
                                    <div className="border-b-2 border-gray-100 pb-2 xl:pb-4 mb-3 xl:mb-5">
                                        <h4 className="font-black text-gray-800 text-base md:text-lg xl:text-2xl">{data.tasks.t1.title}</h4>
                                        <p className="text-xs md:text-sm xl:text-lg font-bold text-gray-500 mt-1 xl:mt-2">{data.tasks.t1.desc}</p>
                                    </div>
                                    <div className="space-y-3 xl:space-y-4">
                                        <input type="text" placeholder={data.tasks.t1.q1} className="w-full p-3 md:p-4 xl:p-5 rounded-xl border-2 border-gray-200 bg-gray-50 outline-none focus:border-red-400 focus:bg-white transition-all text-sm md:text-base xl:text-xl font-medium" value={a1} onChange={(e) => setA1(e.target.value)} />
                                        <input type="text" placeholder={data.tasks.t1.q2} className="w-full p-3 md:p-4 xl:p-5 rounded-xl border-2 border-gray-200 bg-gray-50 outline-none focus:border-red-400 focus:bg-white transition-all text-sm md:text-base xl:text-xl font-medium" value={a2} onChange={(e) => setA2(e.target.value)} />
                                        <input type="text" placeholder={data.tasks.t1.q3} className="w-full p-3 md:p-4 xl:p-5 rounded-xl border-2 border-gray-200 bg-gray-50 outline-none focus:border-red-400 focus:bg-white transition-all text-sm md:text-base xl:text-xl font-medium" value={a3} onChange={(e) => setA3(e.target.value)} />
                                    </div>
                                </div>

                                {/* Langkah 2 */}
                                <div>
                                    <div className="border-b-2 border-gray-100 pb-2 xl:pb-4 mb-3 xl:mb-5 mt-6 xl:mt-10">
                                        <h4 className="font-black text-gray-800 text-base md:text-lg xl:text-2xl">{data.tasks.t2.title}</h4>

        // --- END SCREEN ---
        function EndScreen({ userData, correctCount, onRestart, playerName, playerSchool }) {
            const [isSaving, setIsSaving] = useState(false);
            const [saveStatus, setSaveStatus] = useState("idle"); 

            const handleSaveToGoogleSheets = async () => {
                if(!GOOGLE_SCRIPT_URL || GOOGLE_SCRIPT_URL.includes("MASUKKAN_URL")) return alert("URL Google Script belum dipasang.");
                setIsSaving(true);
                
                // Disesuaikan untuk IPAS Energi
                const payload = {
                    nama: playerName, sekolah: playerSchool, skor: correctCount, benar: correctCount,
                    ref1: "-", ref2: "-", ref3: "-", ref4: "-",
                    papua_masalah: userData.final_project?.['Pemborosan Energi'] || "-",
                    papua_solusi: userData.final_project ? `${userData.final_project['Format Kampanye']} - ${userData.final_project['Isi Pesan Kampanye']}` : "-",
                    papua_kampanye: userData.final_project ? `Alasan Iklim: ${userData.final_project['Alasan Merusak Lingkungan']} | Solusi: ${userData.final_project['Solusi']}` : "-",
                };
                
                try {
                    await fetch(GOOGLE_SCRIPT_URL, { method: "POST", mode: "no-cors", headers: { "Content-Type": "application/json" }, body: JSON.stringify(payload) });
                    setSaveStatus("success");
                } catch (error) { setSaveStatus("error"); } finally { setIsSaving(false); }
            };

            return (
                <div className="flex flex-col items-center justify-center gap-6 xl:gap-10 animate-fade-in w-full flex-1">
                  <div className="text-center bg-white/90 p-6 md:p-10 xl:p-14 rounded-3xl shadow-lg w-full max-w-2xl xl:max-w-4xl border-2 border-white">
                    <img src={LOGO_IMAGE_URL} alt="Logo" className="w-24 h-24 md:w-32 md:h-32 xl:w-48 xl:h-48 object-contain mx-auto animate-bounce-slow drop-shadow-lg" />
                    <h2 className="text-3xl md:text-5xl xl:text-7xl font-black text-gray-800 mt-4 xl:mt-8">SELAMAT!</h2>
                    <p className="text-base md:text-xl xl:text-3xl font-bold mt-2 xl:mt-4">{playerName}, <span className="text-sky-600">Pahlawan Energi Nusantara</span></p>
                    <div className="text-xl md:text-2xl xl:text-4xl font-black text-gray-600 mt-6 xl:mt-10">
                        Menjawab Benar <br/><span className="text-4xl md:text-6xl xl:text-8xl text-yellow-500 text-outline inline-block mt-2">{correctCount} / 21</span> Soal Iklim
                    </div>
                  </div>

                  <div className="w-full max-w-2xl xl:max-w-4xl bg-white p-6 md:p-10 xl:p-12 rounded-3xl shadow-2xl border-4 border-yellow-300 relative text-base">
                    <div className="text-center border-b-2 border-gray-100 pb-4 xl:pb-6 mb-4 xl:mb-6">
                      <h3 className="font-black text-xl md:text-3xl xl:text-4xl text-gray-800">LENCANA BUMI HIJAU</h3>
                      <p className="text-sky-600 font-bold text-lg md:text-xl xl:text-2xl mt-1 xl:mt-2">{playerName} - {playerSchool}</p>
                    </div>
                    <div className="space-y-3 xl:space-y-5 max-h-48 xl:max-h-80 overflow-y-auto pr-3 custom-scrollbar text-sm md:text-base xl:text-xl">
                      <p className="bg-orange-50 p-4 xl:p-6 rounded-xl border border-orange-100"><b className="text-orange-800 block mb-1 xl:mb-2">Janji pada Bumi:</b> "{userData.ref5 || '-'}"</p>
                      <p className="bg-red-50 p-4 xl:p-6 rounded-xl border border-red-100"><b className="text-red-800 block mb-1 xl:mb-2">Rencana Kampanye Energi:</b> "{userData.final_project ? `${userData.final_project['Format Kampanye']} - ${userData.final_project['Isi Pesan Kampanye']}` : '-'}"</p>
                    </div>
                  </div>

                  <div className="w-full max-w-2xl xl:max-w-4xl space-y-4 xl:space-y-6 mt-4">
                    {saveStatus === 'idle' && <button onClick={handleSaveToGoogleSheets} disabled={isSaving} className="bg-blue-600 hover:bg-blue-700 text-white font-black w-full py-5 xl:py-6 rounded-2xl flex items-center justify-center gap-3 text-lg md:text-xl xl:text-2xl shadow-[0_6px_0_#1e40af] active:shadow-none active:translate-y-2 transition-all">{isSaving ? "Menyimpan..." : <><Icons.Save className="w-6 h-6 xl:w-8 xl:h-8"/> Kirim Laporan ke Guru</>}</button>}
                    {saveStatus === 'success' && <div className="bg-green-100 text-green-800 p-5 xl:p-6 rounded-2xl text-center font-bold text-lg xl:text-2xl border-2 border-green-300">Berhasil dikirim! ✅</div>}
                    {saveStatus === 'error' && <div className="bg-red-100 text-red-800 p-5 xl:p-6 rounded-2xl text-center font-bold text-lg xl:text-2xl border-2 border-red-300">Gagal. <button onClick={()=>setSaveStatus('idle')} className="underline text-red-600 ml-2">Coba lagi</button></div>}
                    <button onClick={onRestart} className="bg-green-500 hover:bg-green-600 text-white font-black w-full py-5 xl:py-6 rounded-2xl flex items-center justify-center gap-3 text-lg md:text-xl xl:text-2xl shadow-[0_6px_0_#166534] active:shadow-none active:translate-y-2 transition-all"><Icons.RefreshCcw className="w-6 h-6 xl:w-8 xl:h-8"/> Main Lagi</button>
                  </div>
                </div>
            );
        }

        function ReflectionSection({ question, value, onChange, onNext }) {
            return (
                <div className="bg-white/95 p-8 md:p-12 xl:p-16 rounded-3xl shadow-xl text-center space-y-6 xl:space-y-8 border border-purple-100 w-full max-w-5xl mx-auto animate-fade-in my-auto">
                  <div className="w-20 h-20 xl:w-28 xl:h-28 bg-purple-100 rounded-full flex items-center justify-center mx-auto text-4xl xl:text-6xl shadow-inner">🌍</div>
                  <div>
                    <h3 className="text-2xl md:text-3xl xl:text-5xl font-black text-purple-800 mb-3 xl:mb-5 uppercase tracking-wider">Refleksi Pahlawan Bumi</h3>
                    <p className="text-lg md:text-xl xl:text-3xl font-bold text-gray-700 leading-relaxed whitespace-pre-wrap">{question}</p>
                  </div>
                  <textarea value={value} onChange={(e) => onChange(e.target.value)} className="w-full p-5 xl:p-8 border-2 rounded-2xl text-lg md:text-xl xl:text-3xl bg-purple-50 outline-none focus:border-purple-400 h-40 md:h-48 xl:h-64 text-gray-800 font-medium transition-colors" placeholder="Tuliskan janjimu untuk melindungi bumi di sini..." />
                  <button onClick={onNext} disabled={value.length < 5} className="bg-green-500 hover:bg-green-600 text-white font-black w-full py-5 xl:py-8 text-xl md:text-2xl xl:text-4xl rounded-2xl disabled:opacity-50 shadow-[0_6px_0_#166534] active:shadow-none active:translate-y-2 transition-all disabled:shadow-none disabled:translate-y-0 disabled:cursor-not-allowed">Selesaikan Misi Penyelamatan 🚀</button>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<PetualanganBhinneka />);
    </script>
</body>
</html>
